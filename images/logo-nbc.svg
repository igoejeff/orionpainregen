<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" role="img" aria-label="NBC">
  <!-- NBC Peacock logo with 6 colored feathers + NBC text -->
  <!-- Feather 1: Red -->
  <ellipse cx="70" cy="28" rx="7" ry="18" fill="#E5251D" transform="rotate(-60 70 28)"/>
  <!-- Feather 2: Orange -->
  <ellipse cx="80" cy="18" rx="7" ry="18" fill="#F37021" transform="rotate(-30 80 18)"/>
  <!-- Feather 3: Yellow -->
  <ellipse cx="93" cy="13" rx="7" ry="18" fill="#FFC72C" transform="rotate(0 93 13)"/>
  <!-- Feather 4: Green -->
  <ellipse cx="106" cy="18" rx="7" ry="18" fill="#00853F" transform="rotate(30 106 18)"/>
  <!-- Feather 5: Blue -->
  <ellipse cx="116" cy="28" rx="7" ry="18" fill="#0061A8" transform="rotate(60 116 28)"/>
  <!-- Feather 6: Purple -->
  <ellipse cx="120" cy="42" rx="7" ry="18" fill="#9B26AF" transform="rotate(90 120 42)"/>
  <!-- NBC wordmark -->
  <text x="93" y="75" font-family="'Arial Black', Arial, sans-serif" font-size="20" font-weight="900" fill="#1A1A1A" text-anchor="middle" letter-spacing="1">NBC</text>
</svg>
