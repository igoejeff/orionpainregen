<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" role="img" aria-label="CBS">
  <!-- CBS Eye logo: black circle eye on white background -->
  <!-- Outer circle -->
  <circle cx="55" cy="40" r="34" fill="#000000"/>
  <!-- White eye shape -->
  <ellipse cx="55" cy="40" rx="22" ry="22" fill="#FFFFFF"/>
  <!-- Pupil -->
  <circle cx="55" cy="40" r="13" fill="#000000"/>
  <!-- Iris highlight -->
  <circle cx="55" cy="40" r="7" fill="#FFFFFF"/>
  <!-- CBS wordmark -->
  <text x="128" y="52" font-family="'Arial Black', Arial, sans-serif" font-size="38" font-weight="900" fill="#000000" text-anchor="middle" letter-spacing="-1">CBS</text>
</svg>
