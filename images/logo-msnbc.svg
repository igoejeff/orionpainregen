<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" role="img" aria-label="MSNBC">
  <!-- MSNBC logo: colored stripe bar + MSNBC text in official colors -->
  <!-- Rainbow stripe left bar -->
  <rect x="0" y="8"  width="12" height="12" fill="#E5251D"/>
  <rect x="0" y="20" width="12" height="12" fill="#F37021"/>
  <rect x="0" y="32" width="12" height="12" fill="#FFC72C"/>
  <rect x="0" y="44" width="12" height="12" fill="#00853F"/>
  <rect x="0" y="56" width="12" height="12" fill="#0061A8"/>
  <rect x="0" y="68" width="12" height="12" fill="#9B26AF"/>
  <!-- MSNBC wordmark -->
  <text x="150" y="58" font-family="'Arial Black', Arial, sans-serif" font-size="40" font-weight="900" fill="#0061A8" text-anchor="middle" letter-spacing="-1">MSNBC</text>
</svg>
